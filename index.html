<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Radio Sites</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#header {
  height: 56px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: white;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  position: relative;
  z-index: 1000;
}

#header h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

#header h1 span { color: #e94560; }

#colormap-group {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #aac;
}

#colormap-group label { white-space: nowrap; }

#colormap-select {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
#colormap-select:focus { border-color: #e94560; }
#colormap-select option { background: #16213e; color: white; }

#colormap-bar {
  width: 120px;
  height: 14px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}

/* ── Layout ── */
#main {
  position: relative;
  height: calc(100% - 56px);
}

#map {
  width: 100%;
  height: 100%;
}

/* ── Sidebar ── */
#sidebar {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  background: #fff;
  border-left: 1px solid #dde;
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 16px rgba(0,0,0,0.12);
  z-index: 500;
}

#sidebar.open {
  width: 340px;
}

#sidebar-header {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

#sidebar-title {
  font-size: 15px;
  font-weight: 600;
}

#sidebar-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  padding: 0 2px;
  transition: color 0.15s;
}
#sidebar-close:hover { color: #e94560; }

#sidebar-body {
  flex: 1;
  overflow-y: auto;
  font-size: 13px;
}

.sb-section {
  padding: 12px 16px;
  border-bottom: 1px solid #eef;
}

.sb-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #888;
  margin-bottom: 8px;
}

.sb-props .pk { color: #0f3460; font-weight: bold; }
.sb-props .pv { color: #333; }
.sb-props div { line-height: 1.8; }

.sb-loading { color: #999; font-style: italic; }
.sb-error   { color: #c0392b; }

/* ── Treeview ── */
.treeview { line-height: 1.7; }
.treeview ul { list-style: none; margin: 0; padding-left: 14px; }
.treeview > ul { padding-left: 0; }
.tv-key {
  color: #0f3460;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}
.tv-key::before { content: "\25B6\00A0"; font-size: 9px; color: #e94560; }
.tv-key.open::before { content: "\25BC\00A0"; }
.tv-val { color: #333; }
.tv-children { display: none; }
.tv-children.open { display: block; }

/* ── Filter Panel ── */
#filter-panel {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  background: #fff;
  border-right: 1px solid #dde;
  display: flex;
  flex-direction: column;
  box-shadow: 4px 0 16px rgba(0,0,0,0.12);
  z-index: 500;
}

#filter-panel.open { width: 260px; }

#filter-panel-header {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}

#filter-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

.filter-row { margin-bottom: 18px; }

.filter-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}

.filter-prop-name { color: #0f3460; font-weight: bold; }
.filter-val { color: #888; font-size: 11px; }

.filter-slider {
  width: 100%;
  accent-color: #e94560;
  cursor: pointer;
}

.filter-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #888;
  margin: 16px 0 8px;
  padding-top: 14px;
  border-top: 1px solid #eef;
}

.filter-bitmasks {
  font-size: 11px;
  color: #555;
  font-family: monospace;
  margin-bottom: 8px;
  line-height: 1.7;
}

.filter-tech-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.filter-tech-btn {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid #ccd;
  border-radius: 3px;
  background: #f5f5fa;
  cursor: pointer;
  color: #0f3460;
}
.filter-tech-btn:hover { background: #e8e8f5; }

.filter-tech-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  border: 1px solid #eef;
  border-radius: 4px;
  padding: 4px;
}

.tech-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 4px;
  border-radius: 3px;
}
.tech-row:hover { background: #f0f0fa; }
.tech-row label { font-size: 12px; color: #333; cursor: pointer; user-select: none; }
.tech-row input[type="checkbox"] { accent-color: #e94560; cursor: pointer; flex-shrink: 0; }

#filter-toggle {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
#filter-toggle:hover { background: rgba(255,255,255,0.2); }
#filter-toggle.active { background: #e94560; border-color: #e94560; }

/* ── Responsive ── */
@media (max-width: 600px) {
  #header {
    height: 48px;
    padding: 0 12px;
    gap: 10px;
  }
  #header h1 { font-size: 16px; }
  #colormap-group label { display: none; }
  #colormap-bar { display: none; }

  #main { height: calc(100% - 48px); }

  #filter-panel.open { width: 100%; }
  #sidebar.open      { width: 100%; }

  .tech-row { padding: 6px 4px; }
  .tech-row input[type="checkbox"] { width: 18px; height: 18px; }
}

/* ── Selected point marker ── */
@keyframes pulse {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
}

.selected-marker {
  position: relative;
  width: 14px;
  height: 14px;
}
.selected-marker .core {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #e94560;
  border: 2px solid white;
  box-shadow: 0 0 6px rgba(233,69,96,0.7);
}
.selected-marker .ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #e94560;
  animation: pulse 1.4s ease-out infinite;
}
</style>
</head>
<body>

<div id="header">
  <h1>📡 Radio <span>Sites</span></h1>
  <div id="colormap-group" style="display:none">
    <label for="colormap-select">Color by</label>
    <select id="colormap-select"></select>
    <canvas id="colormap-bar" width="120" height="14"></canvas>
  </div>
  <button id="filter-toggle" title="Toggle filters">Filters</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
    <span id="loading-indicator" style="font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:1px;display:none">Loading…</span>
    <a href="https://github.com/karteum/fradiodb" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.75);line-height:1;text-decoration:none;display:flex;align-items:center;" title="GitHub">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
  </div>
</div>

<div id="main">
  <div id="map"></div>

  <div id="filter-panel">
    <div id="filter-panel-header">Filters</div>
    <div id="filter-panel-body"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">Site</span>
      <button id="sidebar-close" title="Close">✕</button>
    </div>
    <div id="sidebar-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.glify@3.3.1/dist/glify-browser.js"></script>

<script>
const map = L.map('map').setView([46.5, 2.5], 6);
map.zoomControl.setPosition('bottomright');
L.control.scale({ imperial: false, position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// ── Colormap ──────────────────────────────────────────────────────────────────
const COLORMAP = [
  [0,   0,   0.6],
  [0,   0.5, 1  ],
  [0,   1,   0.5],
  [0.8, 1,   0  ],
  [1,   0.4, 0  ],
  [0.8, 0,   0  ],
];

function colormapColor(t) {
  t = Math.max(0, Math.min(1, t));
  const n = COLORMAP.length - 1;
  const lo = Math.floor(t * n);
  const hi = Math.min(lo + 1, n);
  const f = t * n - lo;
  const a = COLORMAP[lo], b = COLORMAP[hi];
  return {
    r: a[0] + (b[0] - a[0]) * f,
    g: a[1] + (b[1] - a[1]) * f,
    b: a[2] + (b[2] - a[2]) * f,
    a: 0.85
  };
}

function drawColormapBar(canvasEl) {
  const ctx = canvasEl.getContext('2d');
  const w = canvasEl.width, h = canvasEl.height;
  for (let x = 0; x < w; x++) {
    const c = colormapColor(x / (w - 1));
    ctx.fillStyle = `rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
    ctx.fillRect(x, 0, 1, h);
  }
}
drawColormapBar(document.getElementById('colormap-bar'));

// ── Treeview builder ──────────────────────────────────────────────────────────
function buildTreeview(data, rootLabel = 'support') {
  function labelForKey(key) {
    if (key === 'antennas') return 'antenna';
    if (key === 'transmitters') return 'transmitter';
    if (key === 'stations') return 'station';
    return rootLabel;
  }
  function itemId(item, itemLabel, i) {
    if (itemLabel === 'support' && item.support_id != null) return item.support_id;
    if (itemLabel === 'station' && item.station_name != null) return item.station_name;
    return i;
  }
  const ITEM_SKIP_KEYS = { support: new Set(['support_id']), station: new Set(['station_name']) };
  function renderArray(arr, itemLabel) {
    const skipKeys = ITEM_SKIP_KEYS[itemLabel] || new Set();
    return arr.map((item, i) => {
      if (item !== null && typeof item === 'object') {
        return `<li><span class="tv-key">${itemLabel} ${itemId(item, itemLabel, i)}</span><ul class="tv-children">${renderObj(item, skipKeys)}</ul></li>`;
      }
      return `<li><span class="tv-val">${String(item)}</span></li>`;
    }).join('');
  }
  function renderObj(obj, skipKeys = new Set()) {
    return Object.entries(obj).filter(([k]) => !skipKeys.has(k)).map(([k, v]) => {
      if (v !== null && typeof v === 'object') {
        if (Array.isArray(v)) {
          const label = labelForKey(k);
          if (label !== 'support') {
            return renderArray(v, label);
          }
          return `<li><span class="tv-key">${k}</span><ul class="tv-children">${renderArray(v, label)}</ul></li>`;
        }
        return `<li><span class="tv-key">${k}</span><ul class="tv-children">${renderObj(v)}</ul></li>`;
      }
      return `<li><span class="pk">${k}:</span> <span class="tv-val">${v === null ? 'null' : String(v)}</span></li>`;
    }).join('');
  }
  if (data == null) return '';
  const inner = Array.isArray(data) ? renderArray(data, rootLabel) : renderObj(data);
  return `<div class="treeview"><ul>${inner}</ul></div>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
// Precision: ~10 screen pixels converted to degrees at current zoom level
function getPrecision() {
  return 10 * 360 / (256 * Math.pow(2, map.getZoom()));
}

const METRO_BBOX = { latMin: 42, latMax: 52, lonMin: -5, lonMax: 9 };

let features = [];
let currentProp = null;
let glifyLayer = null;
let selectedMarker = null;
let minMaxValues = {};   // populated from meta.json
let minMaxMetro = null;  // populated from meta.minmax_metro if present
let minMaxOverseas = null; // populated from meta.minmax_overseas if present
let filters = {};        // { prop: minThreshold } — sites below threshold are hidden
let activeFeatures = []; // subset of features passing current filters
let displayToActive = []; // maps glify point index → activeFeatures index (duplicates share same entry)
let syslist = [];        // technology names from meta.json
const TECH_MAX_BIT = 53n;
let selected_bitmask1 = 0n; // BigInt: selected techs at syslist indices 0–52
let selected_bitmask2 = 0n; // BigInt: selected techs at syslist indices 53+
let techFilterMode = 'OR';  // 'OR' or 'AND'

function isMetro(feature) {
  const [lat, lng] = feature.geometry.coordinates;
  return lng >= METRO_BBOX.lonMin && lng <= METRO_BBOX.lonMax &&
         lat >= METRO_BBOX.latMin && lat <= METRO_BBOX.latMax;
}

function getMinMax(prop, feature) {
  if (minMaxMetro && minMaxOverseas && feature) {
    const mm = isMetro(feature) ? minMaxMetro : minMaxOverseas;
    if (mm[prop]) return mm[prop];
  }
  return minMaxValues[prop] || [0, 140];
}

function isFiltered(feature) {
  for (const [prop, threshold] of Object.entries(filters)) {
    const val = feature?.properties[prop];
    if (typeof val !== 'number' || val < threshold) return true;
  }
  if (syslist.length) {
    const b1 = BigInt(feature.properties.tech_bitmask1 ?? 0);
    const b2 = BigInt(feature.properties.tech_bitmask2 ?? 0);
    if (techFilterMode === 'OR') {
      if ((b1 & selected_bitmask1) === 0n && (b2 & selected_bitmask2) === 0n) return true;
    } else {
      if (!((b1 & selected_bitmask1) === selected_bitmask1 && (b2 & selected_bitmask2) === selected_bitmask2)) return true;
    }
  }
  return false;
}

function scaledSqrt(val, minVal, maxVal) {
  const scaled = (val - minVal) / (maxVal - minVal) * 100;
  //return Math.sqrt(Math.max(0, scaled)) / Math.sqrt(100);
  return Math.max(0, scaled) / 100;
}

function getColor(index) {
  const feature = activeFeatures[displayToActive[index]];
  if (!currentProp) return { r: 0.15, g: 0.5, b: 1, a: 0.85 };
  const val = feature?.properties[currentProp];
  if (typeof val !== 'number') return { r: 0.55, g: 0.55, b: 0.55, a: 0.8 };
  const [minVal, maxVal] = getMinMax(currentProp, feature);
  return colormapColor(scaledSqrt(val, minVal, maxVal));
}

function getSize(index) {
  const feature = activeFeatures[displayToActive[index]];
  if (!currentProp) return 7;
  const val = feature?.properties[currentProp];
  if (typeof val !== 'number') return 7;
  const [minVal, maxVal] = getMinMax(currentProp, feature);
  const t = Math.min(1, scaledSqrt(val, minVal, maxVal));
  return 7 + t * (40 - 7);
}

function buildGlifyLayer() {
  activeFeatures = features.filter(f => !isFiltered(f));
  const countEl = document.getElementById('active-count-display');
  if (countEl) countEl.textContent = activeFeatures.length;
  const displayCoords = [];
  displayToActive = [];
  activeFeatures.forEach((f, i) => {
    const [lat, lng] = f.geometry.coordinates;
    displayCoords.push([lat, lng]);
    displayToActive.push(i);
    if (Math.abs(lng) > 90) {
      displayCoords.push([lat, lng + (lng > 0 ? -360 : 360)]);
      displayToActive.push(i);
    }
  });
  if (glifyLayer) glifyLayer.remove();
  glifyLayer = L.glify.points({
    map,
    data: displayCoords,
    size: getSize,
    color: getColor
  });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
const sidebar    = document.getElementById('sidebar');
const sbTitle    = document.getElementById('sidebar-title');
const sbBody     = document.getElementById('sidebar-body');
const sbClose    = document.getElementById('sidebar-close');

function openSidebar(siteId) {
  sbTitle.textContent = `📡 Site ${siteId}`;
  sidebar.classList.add('open');
}

function closeSidebar() {
  sidebar.classList.remove('open');
  if (selectedMarker) { selectedMarker.remove(); selectedMarker = null; }
}

sbClose.addEventListener('click', closeSidebar);

// ── Selected point marker ─────────────────────────────────────────────────────
const selectedIcon = L.divIcon({
  className: '',
  html: '<div class="selected-marker"><div class="ring"></div><div class="core"></div></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadMinMax() {
  try {
    const resp = await fetch('meta.json');
    if (!resp.ok) throw new Error(resp.statusText);
    const meta = await resp.json();
    minMaxValues = meta.minmax;
    if (meta.syslist) syslist = meta.syslist;
    if (meta.minmax_metro && meta.minmax_overseas) {
      minMaxMetro = meta.minmax_metro;
      minMaxOverseas = meta.minmax_overseas;
    }
    return true;
  } catch (e) {
    console.warn('Could not load meta.json:', e.message);
    return false;
  }
}

function computeSelectedBitmasks(checkboxEls) {
  let mask = 0n;
  checkboxEls.forEach((cb, i) => {
    if (cb.checked) mask |= (1n << BigInt(i));
  });
  selected_bitmask1 = mask & ((1n << TECH_MAX_BIT) - 1n);
  selected_bitmask2 = mask >> TECH_MAX_BIT;
  const el1 = document.getElementById('bitmask1-display');
  const el2 = document.getElementById('bitmask2-display');
  if (el1) el1.textContent = '0x' + selected_bitmask1.toString(16);
  if (el2) el2.textContent = '0x' + selected_bitmask2.toString(16);
}

function buildFilterPanel() {
  const body = document.getElementById('filter-panel-body');
  const props = Object.keys(minMaxValues);
  if (!props.length) return;
  body.innerHTML = '';
  props.forEach(prop => {
    const [minVal, maxVal] = minMaxValues[prop];
    const row = document.createElement('div');
    row.className = 'filter-row';

    const labelEl = document.createElement('div');
    labelEl.className = 'filter-label';
    const valSpan = document.createElement('span');
    valSpan.className = 'filter-val';
    valSpan.textContent = '(off)';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'filter-prop-name';
    nameSpan.textContent = prop;
    labelEl.appendChild(nameSpan);
    labelEl.appendChild(valSpan);

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.className = 'filter-slider';
    slider.min = minVal;
    slider.max = maxVal;
    slider.value = minVal;
    slider.step = Math.max(1, (maxVal - minVal) / 200);
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      if (v <= minVal) {
        delete filters[prop];
        valSpan.textContent = '(off)';
      } else {
        filters[prop] = v;
        valSpan.textContent = `≥ ${v.toFixed(0)}`;
      }
      buildGlifyLayer();
    });

    row.appendChild(labelEl);
    row.appendChild(slider);
    body.appendChild(row);
  });

  if (!syslist.length) return;

  // ── Technology checkboxes ──
  const techTitle = document.createElement('div');
  techTitle.className = 'filter-section-title';
  techTitle.textContent = 'Technologies';
  body.appendChild(techTitle);

  const bitmaskDiv = document.createElement('div');
  bitmaskDiv.className = 'filter-bitmasks';
  bitmaskDiv.innerHTML =
    'bitmask1: <span id="bitmask1-display">0</span><br>' +
    'bitmask2: <span id="bitmask2-display">0</span><br>' +
    'count: <span id="active-count-display">0</span>';
  body.appendChild(bitmaskDiv);

  const controls = document.createElement('div');
  controls.className = 'filter-tech-controls';
  const btnAll  = document.createElement('button');
  btnAll.className  = 'filter-tech-btn';
  btnAll.textContent = 'All';
  const btnNone = document.createElement('button');
  btnNone.className = 'filter-tech-btn';
  btnNone.textContent = 'None';
  const modeSelect = document.createElement('select');
  modeSelect.className = 'filter-tech-btn';
  modeSelect.style.cursor = 'pointer';
  ['OR', 'AND'].forEach(val => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val;
    modeSelect.appendChild(opt);
  });
  modeSelect.value = techFilterMode;
  modeSelect.addEventListener('change', () => {
    techFilterMode = modeSelect.value;
    buildGlifyLayer();
  });
  controls.appendChild(btnAll);
  controls.appendChild(btnNone);
  controls.appendChild(modeSelect);
  body.appendChild(controls);

  const list = document.createElement('div');
  list.className = 'filter-tech-list';
  const checkboxEls = [];

  syslist.forEach((tech, i) => {
    const row = document.createElement('div');
    row.className = 'tech-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `tech-cb-${i}`;
    cb.checked = true;
    const lbl = document.createElement('label');
    lbl.htmlFor = `tech-cb-${i}`;
    lbl.textContent = tech;
    cb.addEventListener('change', () => {
      computeSelectedBitmasks(checkboxEls);
      buildGlifyLayer();
    });
    row.appendChild(cb);
    row.appendChild(lbl);
    list.appendChild(row);
    checkboxEls.push(cb);
  });

  btnAll.addEventListener('click', () => {
    checkboxEls.forEach(cb => { cb.checked = true; });
    computeSelectedBitmasks(checkboxEls);
    buildGlifyLayer();
  });
  btnNone.addEventListener('click', () => {
    checkboxEls.forEach(cb => { cb.checked = false; });
    computeSelectedBitmasks(checkboxEls);
    buildGlifyLayer();
  });

  body.appendChild(list);

  // Initialise bitmasks with all checked
  computeSelectedBitmasks(checkboxEls);
}

document.getElementById('filter-toggle').addEventListener('click', () => {
  const panel = document.getElementById('filter-panel');
  const btn = document.getElementById('filter-toggle');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
});

async function loadPoints(minMaxLoaded) {
  document.getElementById('loading-indicator').style.display = '';
  const resp = await fetch('sites.geojson');
  const geojson = await resp.json();
  for (const feature of geojson.features) {
    if (feature.geometry.type !== 'Point') continue;
    const [lng, lat] = feature.geometry.coordinates;
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lat, lng] },
      properties: feature.properties
    });
  }
  document.getElementById('loading-indicator').style.display = 'none';
  console.log('points loaded:', features.length);

  if (minMaxLoaded && Object.keys(minMaxValues).length) {
    const sel = document.getElementById('colormap-select');
    const noneOpt = document.createElement('option');
    noneOpt.value = ''; noneOpt.textContent = '(none)';
    sel.appendChild(noneOpt);
    Object.keys(minMaxValues).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
    document.getElementById('colormap-group').style.display = 'flex';
    sel.addEventListener('change', () => {
      currentProp = sel.value || null;
      buildGlifyLayer();
    });
    buildFilterPanel();
  }

  buildGlifyLayer();
}

loadMinMax().then(loadPoints);

// ── Hit-test helper (checks original lng and antimeridian duplicate) ───────────
function findFeatureAt(lat, lng, prec) {
  for (const f of activeFeatures) {
    if (Math.abs(f.geometry.coordinates[0] - lat) >= prec) continue;
    const origLng = f.geometry.coordinates[1];
    if (Math.abs(origLng - lng) < prec) return { feature: f, markerLng: origLng };
    if (Math.abs(origLng) > 90) {
      const dupLng = origLng + (origLng > 0 ? -360 : 360);
      if (Math.abs(dupLng - lng) < prec) return { feature: f, markerLng: dupLng };
    }
  }
  return null;
}

// ── Click handler ─────────────────────────────────────────────────────────────
map.on('click', function(e) {
  const { lat, lng } = e.latlng;
  const prec = getPrecision();
  const hit = findFeatureAt(lat, lng, prec);
  if (!hit) return;

  const { feature, markerLng } = hit;
  const props = feature.properties;
  const siteId = props.site_id;
  const latlng = [feature.geometry.coordinates[0], markerLng];

  // Place selected marker
  if (selectedMarker) selectedMarker.remove();
  selectedMarker = L.marker(latlng, { icon: selectedIcon, zIndexOffset: 1000 }).addTo(map);

  // Build properties section
  let propsHTML = '';
  for (const [k, v] of Object.entries(props)) {
    if (k === 'site_id') continue;
    const display = (k === 'tech_bitmask1' || k === 'tech_bitmask2')
      ? '0x' + BigInt(v ?? 0).toString(16)
      : v;
    propsHTML += `<div><span class="pk">${k}:</span> <span class="pv">${display}</span></div>`;
  }

  sbBody.innerHTML = `
    <div class="sb-section sb-props">
      <div class="sb-section-title">Properties</div>
      ${propsHTML}
    </div>
    <div class="sb-section" id="sb-ajax">
      <div class="sb-section-title">Site data</div>
      <span class="sb-loading">Loading…</span>
    </div>`;

  openSidebar(siteId);

  fetch(`site/${siteId}`)
    .then(r => r.json())
    .then(data => {
      const ajaxDiv = document.getElementById('sb-ajax');
      if (!ajaxDiv) return;
      const topFields = Object.entries(data).filter(([k]) => k !== 'supports' && k !== 'stations');
      let siteInfoHTML = topFields.map(([k, v]) =>
        `<div><span class="pk">${k}:</span> <span class="pv">${v}</span></div>`
      ).join('');
      ajaxDiv.innerHTML = `
        <div class="sb-section-title">Site info</div>
        <div class="sb-props">${siteInfoHTML}</div>
        ${data.supports != null ? `<div class="sb-section-title" style="margin-top:10px">Supports</div>${buildTreeview(data.supports)}` : ''}
        ${data.stations != null ? `<div class="sb-section-title" style="margin-top:10px">Stations</div>${buildTreeview(data.stations, 'station')}` : ''}`;
      ajaxDiv.addEventListener('click', ev => {
        const el = ev.target.closest('.tv-key');
        if (!el) return;
        el.classList.toggle('open');
        el.nextElementSibling.classList.toggle('open');
      });
    })
    .catch(err => {
      const ajaxDiv = document.getElementById('sb-ajax');
      if (ajaxDiv) ajaxDiv.innerHTML = `<div class="sb-section-title">Site data</div><span class="sb-error">Error: ${err.message}</span>`;
    });
});

// Cursor pointer on hover
map.on('mousemove', function(e) {
  const { lat, lng } = e.latlng;
  const prec = getPrecision();
  const over = !!findFeatureAt(lat, lng, prec);
  map.getContainer().style.cursor = over ? 'pointer' : '';
});
</script>
